<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: visible;
  }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #111827;
    white-space: nowrap;
  }
  .ai {
    background: linear-gradient(100deg, #6d28d9 0%, #a21caf 55%, #ec4899 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .cursor {
    display: inline-block;
    width: 2px;
    /*
     * vertical-align: middle centres on the x-height midpoint — balanced
     * across cap height above and descenders below without overshooting
     * the dead space at the top of the em square.
     */
    height: 1em;
    vertical-align: middle;
    background: #111827;
    margin-left: 2px;
    border-radius: 1px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
  }
</style>
</head>
<body>
<span>Ask&nbsp;<span class="ai">✦ Skills</span>:&nbsp;</span><span id="t" aria-live="polite"></span><span class="cursor" id="c" aria-hidden="true"></span>
<script>
(function(){
  var Q = [
    "How do I address my skills gap?",
    "How can I see skill gaps within my team?",
    "Which skills should I prioritise developing next?",
    "What learning resources match my role?",
    "What skills do I need to develop to grow in my role?"
  ];
  var t = document.getElementById('t');
  var c = document.getElementById('c');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    t.textContent = Q[0]; c.style.display = 'none'; return;
  }
  var qi = 0, ci = 0, del = false;
  function tick() {
    var q = Q[qi];
    if (!del) {
      t.textContent = q.slice(0, ++ci);
      if (ci === q.length) { del = true; setTimeout(tick, 2500); return; }
      setTimeout(tick, 55);
    } else {
      t.textContent = q.slice(0, --ci);
      if (ci === 0) { del = false; qi = (qi + 1) % Q.length; setTimeout(tick, 350); return; }
      setTimeout(tick, 28);
    }
  }
  setTimeout(tick, 600);
}());
</script>
</body>
</html>
